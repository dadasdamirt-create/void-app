<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE VOID</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #fff; --bg-color: #000; --accent: #222; }
        body { background-color: var(--bg-color); color: var(--main-color); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; user-select: none; }
        
        #global-container { margin-top: 40px; text-align: center; opacity: 0.5; letter-spacing: 2px; font-size: 0.65rem; }
        #global-matter { display: block; font-size: 0.8rem; margin-top: 5px; color: #aaa; }

        /* Прогресс бар уровня */
        #level-container { width: 80%; height: 4px; background: #111; margin-top: 20px; border-radius: 2px; overflow: hidden; }
        #level-bar { width: 0%; height: 100%; background: var(--main-color); transition: width 0.3s ease; box-shadow: 0 0 10px #fff; }

        /* Сфера с анимацией */
        #sphere-wrapper { position: relative; margin-top: 40px; }
        #void-sphere { 
            width: 200px; height: 200px; 
            background: radial-gradient(circle, #151515 0%, #000 75%); 
            border-radius: 50%; border: 1px solid #222;
            box-shadow: 0 0 30px rgba(255,255,255,0.02);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #void-sphere:active { transform: scale(0.92); border-color: #444; }

        #balance { font-size: 3.2rem; margin-top: 20px; font-weight: 200; font-variant-numeric: tabular-nums; }
        .label { color: #444; font-size: 0.6rem; letter-spacing: 4px; margin-bottom: 30px; }

        .btn-panel { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 90%; margin-top: auto; padding-bottom: 40px; }
        .ui-btn { background: #0a0a0a; border: 1px solid #1a1a1a; color: #eee; padding: 12px; border-radius: 12px; flex: 1; min-width: 80px; text-align: center; cursor: pointer; font-size: 0.6rem; transition: background 0.2s; }
        .ui-btn:active { background: #151515; }
        .cost { color: #555; display: block; font-size: 0.5rem; margin-top: 4px; }

        /* Эффекты */
        .particle { position: fixed; pointer-events: none; background: #fff; border-radius: 50%; z-index: 100; }
        @keyframes particle-fly {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; padding-top: 60px; text-align: center; }
        .quest-card { background: #080808; border: 1px solid #111; margin: 10px 20px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="global-container">THE UNIVERSE REMAINS<span id="global-matter">1000.0000</span></div>
    
    <div id="level-container"><div id="level-bar"></div></div>

    <div id="sphere-wrapper">
        <div id="void-sphere"></div>
    </div>

    <div id="balance">0.0000</div>
    <div class="label">MATTER EXTRACTED</div>

    <div class="btn-panel">
        <div class="ui-btn" onclick="toggleModal('leaderboard')">RANK</div>
        <div class="ui-btn" onclick="buyUpgrade('click')">SHARPEN<span class="cost" id="cost-click">...</span></div>
        <div class="ui-btn" onclick="buyUpgrade('auto')">PULSE<span class="cost" id="cost-auto">...</span></div>
        <div class="ui-btn" onclick="toggleModal('rewards')" style="border-color: #333;">EARN</div>
    </div>

    <div id="leaderboard" class="modal">
        <div style="letter-spacing: 5px; opacity: 0.3; margin-bottom: 30px;">RANKINGS</div>
        <div id="leader-list"></div>
        <div class="ui-btn" onclick="toggleModal('leaderboard')" style="width: 100px; margin-top: 40px;">BACK</div>
    </div>

    <div id="rewards" class="modal">
        <div style="letter-spacing: 5px; opacity: 0.3; margin-bottom: 30px;">REWARDS</div>
        <div class="quest-card">
            <div style="text-align: left;">
                <div style="font-size: 0.9rem;">Daily Cycle</div>
                <div style="font-size: 0.6rem; color: #444;">Claim your reward</div>
            </div>
            <div class="ui-btn" onclick="claimDaily()" style="min-width: 60px;">CLAIM</div>
        </div>
        <div class="quest-card">
            <div style="text-align: left;">
                <div style="font-size: 0.9rem;">Expansion</div>
                <div id="ref-count" style="font-size: 0.6rem; color: #444;">Invite 3 friends</div>
            </div>
            <div class="ui-btn" onclick="completeQuest('invite_3')" style="min-width: 60px;">CHECK</div>
        </div>
        <div class="ui-btn" onclick="inviteFriend()" style="width: 80%; margin: 20px auto;">INVITE FRIENDS</div>
        <div class="ui-btn" onclick="toggleModal('rewards')" style="width: 100px; margin-top: 20px;">BACK</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#000000';
        tg.headerColor = '#000000';

        const userId = tg.initDataUnsafe?.user?.id || 'guest';
        const userName = tg.initDataUnsafe?.user?.first_name || 'Guest';
        const referrerId = tg.initDataUnsafe?.start_param || null;

        let currentBalance = 0;
        let autoPower = 0;

        // Создание частиц
        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 3 + 1;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const tx = (Math.random() - 0.5) * 200;
                const ty = (Math.random() - 0.5) * 200;
                p.style.setProperty('--x', tx + 'px');
                p.style.setProperty('--y', ty + 'px');
                p.style.animation = 'particle-fly 0.8s ease-out forwards';
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        async function apiRequest(action = 'load') {
            try {
                const res = await fetch('/api/click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, userName, action, referrerId })
                });
                const data = await res.json();
                currentBalance = data.balance;
                autoPower = data.autoPower || 0;
                
                document.getElementById('balance').innerText = currentBalance.toFixed(4);
                document.getElementById('global-matter').innerText = data.globalMatter.toFixed(4);
                document.getElementById('cost-click').innerText = data.nextClickCost.toFixed(4);
                document.getElementById('cost-auto').innerText = data.nextAutoCost.toFixed(4);
                document.getElementById('ref-count').innerText = `Friends: ${data.referralCount}/3`;

                // Обновление прогресс-бара (условно до 1000 кликов на уровень)
                const progress = (data.balance * 100) % 100;
                document.getElementById('level-bar').style.width = progress + '%';
            } catch (e) { console.error(e); }
        }

        // Клик
        document.getElementById('void-sphere').onclick = (e) => {
            createParticles(e.clientX, e.clientY);
            
            const flyText = document.createElement('div');
            flyText.innerText = '+';
            flyText.style.position = 'fixed'; flyText.style.left = e.clientX + 'px'; flyText.style.top = e.clientY + 'px';
            flyText.style.animation = 'flyUp 1s forwards'; document.body.appendChild(flyText);
            setTimeout(() => flyText.remove(), 1000);

            tg.HapticFeedback.impactOccurred('light');
            currentBalance += 0.0001;
            document.getElementById('balance').innerText = currentBalance.toFixed(4);
            apiRequest('click');
        };

        // Остальные функции (buyUpgrade, toggleModal, loadLeaderboard, claimDaily, completeQuest, inviteFriend)
        // Скопируй их из своего прошлого кода index.html без изменений
        async function buyUpgrade(type) {
            const res = await fetch('/api/upgrade', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, type })
            });
            const data = await res.json();
            if (data.success) { tg.HapticFeedback.notificationOccurred('success'); apiRequest('load'); }
            else tg.showAlert(data.message);
        }

        function toggleModal(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'n
