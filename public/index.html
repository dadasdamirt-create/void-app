<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE VOID</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #fff; --bg-color: #000; --skin-color: #fff; --event-color: #ff3333; }
        body { background: var(--bg-color); color: var(--main-color); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; user-select: none; }
        
        #event-banner { position: absolute; top: 0; width: 100%; padding: 8px; background: var(--event-color); color: #000; font-weight: bold; font-size: 0.65rem; text-align: center; transform: translateY(-100%); transition: 0.5s; z-index: 2000; }
        body.event-active #event-banner { transform: translateY(0); }

        #global-display { margin-top: 40px; text-align: center; z-index: 10; }
        #global-label { font-size: 0.6rem; letter-spacing: 3px; opacity: 0.4; display: block; margin-bottom: 5px; }
        #global-matter { font-size: 0.9rem; font-family: monospace; color: #888; }

        #level-container { width: 80%; height: 4px; background: #111; margin-top: 20px; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        #level-bar { width: 2%; height: 100%; background: var(--skin-color); box-shadow: 0 0 15px var(--skin-color); transition: 0.5s; }

        #void-sphere { 
            width: 190px; height: 190px; margin-top: 40px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 70%); 
            border-radius: 50%; border: 2px solid var(--skin-color); 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: 0.2s; box-shadow: 0 0 30px rgba(255,255,255,0.05); z-index: 100;
        }
        body.event-active #void-sphere { border-color: var(--event-color); box-shadow: 0 0 50px var(--event-color); }

        #balance { font-size: 3.2rem; margin-top: 20px; font-weight: 200; font-variant-numeric: tabular-nums; }
        .sub-label { color: #333; font-size: 0.6rem; letter-spacing: 4px; }

        .btn-panel { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 90%; margin-top: auto; padding-bottom: 40px; z-index: 100; }
        .ui-btn { background: #080808; border: 1px solid #1a1a1a; color: #eee; padding: 12px; border-radius: 12px; flex: 1; min-width: 80px; text-align: center; cursor: pointer; font-size: 0.6rem; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; padding-top: 60px; text-align: center; overflow-y: auto; }
        .card { background: #0a0a0a; border: 1px solid #151515; margin: 10px 20px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .particle { position: fixed; pointer-events: none; background: var(--skin-color); border-radius: 50%; z-index: 50; }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body id="main-body">

    <div id="event-banner">VOID BREACH: 5X MULTIPLIER ACTIVE</div>

    <div id="global-display">
        <span id="global-label">UNIVERSE REMAINS</span>
        <span id="global-matter">1000000.0000</span>
    </div>

    <div id="level-container"><div id="level-bar"></div></div>

    <div id="void-sphere"></div>

    <div id="balance">0.0000</div>
    <div class="sub-label">MATTER</div>

    <div class="btn-panel">
        <div class="ui-btn" onclick="toggleModal('leaderboard')">RANK</div>
        <div class="ui-btn" onclick="toggleModal('shop')">SHOP</div>
        <div class="ui-btn" onclick="toggleModal('rewards')">EARN</div>
    </div>

    <!-- MODALS -->
    <div id="leaderboard" class="modal">
        <div style="opacity: 0.3; letter-spacing: 5px; margin-bottom: 20px;">RANKINGS</div>
        <div id="leader-list"></div>
        <div class="ui-btn" onclick="toggleModal('leaderboard')" style="width: 80px; margin: 30px auto;">BACK</div>
    </div>

    <div id="shop" class="modal">
        <div style="opacity: 0.3; letter-spacing: 5px; margin-bottom: 20px;">SHOP</div>
        <div class="card"><div>Click Power<div id="cost-click" style="font-size: 0.5rem; color: #444;">...</div></div><div class="ui-btn" onclick="buyUpgrade('click')" style="min-width: 60px;">UP</div></div>
        <div class="card"><div>Auto Miner<div id="cost-auto" style="font-size: 0.5rem; color: #444;">...</div></div><div class="ui-btn" onclick="buyUpgrade('auto')" style="min-width: 60px;">UP</div></div>
        <div style="margin: 20px; font-size: 0.6rem; color: #333;">SKINS</div>
        <div id="skin-list"></div>
        <div class="ui-btn" onclick="toggleModal('shop')" style="width: 80px; margin: 20px auto;">BACK</div>
    </div>

    <div id="rewards" class="modal">
        <div style="opacity: 0.3; letter-spacing: 5px; margin-bottom: 20px;">EARN</div>
        <div class="card"><div>Daily Cycle</div><div class="ui-btn" onclick="claimDaily()" style="min-width: 60px;">CLAIM</div></div>
        <div class="card"><div>Sub Channel (+0.1)</div><div class="ui-btn" onclick="completeQuest('sub_tg')" style="min-width: 60px;">GO</div></div>
        <div class="card"><div>Invite 3 Friends<div id="ref-count" style="font-size: 0.5rem; color: #444;">0/3</div></div><div class="ui-btn" onclick="completeQuest('invite_3')" style="min-width: 60px;">CHECK</div></div>
        <div class="ui-btn" onclick="inviteFriend()" style="width: 80%; margin: 20px auto;">INVITE LINK</div>
        <div class="ui-btn" onclick="toggleModal('rewards')" style="width: 80px; margin: 20px auto;">BACK</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const userId = tg.initDataUnsafe?.user?.id || 'guest';
        const userName = tg.initDataUnsafe?.user?.first_name || 'Guest';
        const referrerId = tg.initDataUnsafe?.start_param || null;

        let currentBalance = 0;
        let autoPower = 0;
        let ownedSkins = [];
        let activeSkin = 'white';
        let isEvent = false;

        const skinConfig = {
            'white': { name: 'White', color: '#ffffff', price: 0 },
            'gold': { name: 'Gold', color: '#ffd700', price: 0.5 },
            'plasma': { name: 'Plasma', color: '#00ffff', price: 2.0 },
            'emerald': { name: 'Emerald', color: '#50c878', price: 10.0 },
            'ruby': { name: 'Ruby', color: '#e0115f', price: 50.0 }
        };

        async function apiRequest(action = 'load') {
            try {
                const res = await fetch('/api/click', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, userName, action, referrerId })
                });
                const data = await res.json();
                
                currentBalance = data.balance;
                autoPower = data.autoPower || 0;
                ownedSkins = data.ownedSkins || ['white'];
                isEvent = data.eventActive;
                
                document.getElementById('balance').innerText = currentBalance.toFixed(4);
                document.getElementById('global-matter').innerText = data.globalMatter.toFixed(4);
                document.getElementById('cost-click').innerText = data.nextClickCost.toFixed(4);
                document.getElementById('cost-auto').innerText = data.nextAutoCost.toFixed(4);
                document.getElementById('ref-count').innerText = `${data.referralCount || 0}/3`;
                
                const progress = ((data.totalExtracted % 0.5) / 0.5) * 100;
                document.getElementById('level-bar').style.width = Math.max(progress, 2) + '%';
                
                document.getElementById('main-body').classList.toggle('event-active', isEvent);
                updateSkinUI(data.currentSkin);
            } catch(e) { console.error(e); }
        }

        function updateSkinUI(skin) {
            activeSkin = skin;
            document.documentElement.style.setProperty('--skin-color', skinConfig[skin].color);
            const list = document.getElementById('skin-list');
            list.innerHTML = Object.keys(skinConfig).filter(s => s !== 'white').map(s => {
                const isOwned = ownedSkins.includes(s);
                return `<div class="card">
                    <div style="text-align:left"><div style="color:${skinConfig[s].color}">${skinConfig[s].name}</div><div style="font-size:0.5rem;color:#444">${isOwned?'Owned':'Price: '+skinConfig[s].price}</div></div>
                    <div class="ui-btn" onclick="manageSkin('${s}')" style="min-width:60px">${isOwned?(activeSkin===s?'ACTIVE':'USE'):'BUY'}</div>
                </div>`;
            }).join('');
        }

        async function manageSkin(skinId) {
            const action = ownedSkins.includes(skinId) ? 'use' : 'buy';
            const res = await fetch('/api/skin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, skinId, action }) });
            const data = await res.json();
            if (data.success) { ownedSkins = data.ownedSkins; apiRequest('load'); }
            else tg.showAlert("Not enough matter");
        }

        async function buyUpgrade(type) {
            const res = await fetch('/api/upgrade', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, type }) });
            const data = await res.json();
            if (data.success) { tg.HapticFeedback.notificationOccurred('success'); apiRequest('load'); }
            else tg.showAlert("Not enough matter");
        }

        function toggleModal(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
            if (id === 'leaderboard' && el.style.display === 'block') loadLeaderboard();
        }

        async function loadLeaderboard() {
            const res = await fetch('/api/leaderboard');
            const leaders = await res.json();
            document.getElementById('leader-list').innerHTML = leaders.map((p, i) => `
                <div style="display:flex;justify-content:space-between;width:85%;margin:10px auto;padding:8px;border-bottom:1px solid #111;font-size:0.75rem;color:#666">
                    <span>${i+1}. ${p.name}</span><span>${p.balance.toFixed(4)}</span>
                </div>`).join('');
        }

        async function claimDaily() {
            const res = await fetch('/api/daily-bonus', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId }) });
            const data = await res.json();
            if (data.success) { tg.showAlert("Claimed!"); apiRequest('load'); }
            else tg.showAlert(data.message || "Error");
        }

        async function completeQuest(questId) {
            if(questId === 'sub_tg') tg.openTelegramLink('https://t.me/your_channel');
            const res = await fetch('/api/complete-quest', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, questId }) });
            const data = await res.json();
            if (data.success) { tg.showAlert("Completed!"); apiRequest('load'); }
            else tg.showAlert("Conditions not met");
        }

        function inviteFriend() {
            const botUsername = 'void_clicker_bot'; 
            const link = `https://t.me/${botUsername}?start=${userId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join me!`);
        }

        document.getElementById('void-sphere').onclick = (e) => {
            tg.HapticFeedback.impactOccurred(isEvent ? 'heavy' : 'light');
            currentBalance += (isEvent ? 0.0005 : 0.0001); 
            document.getElementById('balance').innerText = currentBalance.toFixed(4);
            apiRequest('click');
        };

        setInterval(() => { if (autoPower > 0) { currentBalance += autoPower; document.getElementById('balance').innerText = currentBalance.toFixed(4); } }, 1000);
        setInterval(() => apiRequest('load'), 7000);
        apiRequest('load');
    </script>
</body>
</html>
