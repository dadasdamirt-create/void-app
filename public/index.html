<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE VOID</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #000; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; user-select: none; }
        #global-container { position: absolute; top: 40px; text-align: center; color: #444; letter-spacing: 2px; font-size: 0.7rem; }
        #global-matter { color: #888; font-size: 0.9rem; display: block; margin-top: 5px; }
        #void-sphere { width: 200px; height: 200px; background: radial-gradient(circle, #222 0%, #000 80%); border-radius: 50%; border: 2px solid #333; box-shadow: 0 0 20px rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.05s ease; z-index: 10; }
        #void-sphere:active { transform: scale(0.95); }
        #balance { font-size: 3rem; margin-top: 20px; font-weight: 100; }
        .label { color: #333; font-size: 0.6rem; letter-spacing: 4px; }
        .btn-panel { position: absolute; bottom: 30px; display: flex; gap: 20px; }
        .ui-btn { color: #444; font-size: 0.7rem; letter-spacing: 2px; cursor: pointer; border: 1px solid #222; padding: 10px 20px; border-radius: 5px; }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="global-container">TOTAL VOID REMAINING<span id="global-matter">1000.0000</span></div>
    <div id="void-sphere"></div>
    <div id="balance">0.0000</div>
    <div class="label">MY MATTER</div>

    <div class="btn-panel">
        <div class="ui-btn" onclick="toggleLeaderboard()">TOP</div>
        <div class="ui-btn" onclick="buyUpgrade()">UPGRADE (0.0050)</div>
    </div>

    <div id="leaderboard" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; padding-top:60px; text-align:center;">
        <div style="letter-spacing:5px; color:#555; margin-bottom:20px;">TOP EXTRACTORS</div>
        <div id="leader-list" style="width:80%; margin:20px auto;"></div>
        <div class="ui-btn" onclick="toggleLeaderboard()">CLOSE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const balanceDisplay = document.getElementById('balance');
        const globalDisplay = document.getElementById('global-matter');
        const sphere = document.getElementById('void-sphere');
        const user = tg.initDataUnsafe?.user;
        const userId = user?.id || 'guest';
        const userName = user?.first_name || 'Guest';

        async function apiRequest(action = 'load') {
            const res = await fetch('/api/click', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, userName, action })
            });
            const data = await res.json();
            balanceDisplay.innerText = data.balance.toFixed(4);
            globalDisplay.innerText = data.globalMatter.toFixed(4);
        }

        async function buyUpgrade() {
            const res = await fetch('/api/upgrade', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId })
            });
            const data = await res.json();
            if (data.success) {
                tg.showAlert('Улучшение куплено! Теперь клик мощнее.');
                balanceDisplay.innerText = data.balance.toFixed(4);
            } else {
                tg.showAlert(data.message);
            }
        }

        async function toggleLeaderboard() {
            const el = document.getElementById('leaderboard');
            if (el.style.display === 'block') el.style.display = 'none';
            else {
                el.style.display = 'block';
                const res = await fetch('/api/leaderboard');
                const leaders = await res.json();
                document.getElementById('leader-list').innerHTML = leaders.map((p, i) => `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #111;">
                        <span>${i+1}. ${p.name}</span><span>${p.balance.toFixed(4)}</span>
                    </div>`).join('');
            }
        }

        sphere.onclick = (e) => {
            const flyText = document.createElement('div');
            flyText.innerText = '+';
            flyText.style.position = 'fixed'; flyText.style.left = e.clientX + 'px'; flyText.style.top = e.clientY + 'px';
            flyText.style.animation = 'flyUp 1s forwards'; document.body.appendChild(flyText);
            setTimeout(() => flyText.remove(), 1000);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            apiRequest('click');
        };

        apiRequest('load');
    </script>
</body>
</html>
