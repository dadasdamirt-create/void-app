<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE VOID</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #000; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 60px; height: 100vh; font-family: sans-serif; overflow: hidden; user-select: none; }
        #global-container { text-align: center; color: #444; letter-spacing: 2px; font-size: 0.7rem; margin-bottom: 20px; }
        #global-matter { color: #888; font-size: 0.9rem; display: block; }
        #void-sphere { width: 180px; height: 180px; background: radial-gradient(circle, #222 0%, #000 80%); border-radius: 50%; border: 2px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.05s ease; box-shadow: 0 0 20px rgba(255,255,255,0.05); }
        #void-sphere:active { transform: scale(0.95); }
        #balance { font-size: 2.8rem; margin-top: 20px; font-weight: 100; font-variant-numeric: tabular-nums; }
        .label { color: #333; font-size: 0.6rem; letter-spacing: 4px; margin-bottom: 20px; }
        .btn-panel { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 95%; }
        .ui-btn { color: #ccc; font-size: 0.5rem; letter-spacing: 1px; cursor: pointer; border: 1px solid #222; padding: 10px; border-radius: 8px; background: #050505; flex: 1; min-width: 80px; text-align: center; line-height: 1.4; }
        .cost { color: #555; display: block; font-size: 0.45rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 100; padding-top: 50px; text-align: center; }
        .quest-card { background: #0a0a0a; border: 1px solid #1a1a1a; margin: 10px 20px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="global-container">TOTAL VOID REMAINING<span id="global-matter">1000.0000</span></div>
    <div id="void-sphere"></div>
    <div id="balance">0.0000</div>
    <div class="label">MY MATTER</div>

    <div class="btn-panel">
        <div class="ui-btn" onclick="toggleModal('leaderboard')">TOP</div>
        <div class="ui-btn" onclick="buyUpgrade('click')">CLICK+<br><span class="cost" id="cost-click">...</span></div>
        <div class="ui-btn" onclick="buyUpgrade('auto')">AUTO+<br><span class="cost" id="cost-auto">...</span></div>
        <div class="ui-btn" onclick="toggleModal('rewards')" style="background:#111;">REWARDS</div>
    </div>

    <div id="leaderboard" class="modal">
        <div style="letter-spacing:5px; color:#555; margin-bottom:20px;">RANKINGS</div>
        <div id="leader-list" style="width:85%; margin:0 auto;"></div>
        <div class="ui-btn" onclick="toggleModal('leaderboard')" style="width:100px; margin:20px auto;">CLOSE</div>
    </div>

    <div id="rewards" class="modal">
        <div style="letter-spacing:5px; color:#555; margin-bottom:20px;">REWARDS & QUESTS</div>
        
        <div class="quest-card">
            <div style="text-align:left;">
                <div style="font-size:0.8rem;">Daily Bonus</div>
                <div style="font-size:0.5rem; color:#444;">Забирай каждый день</div>
            </div>
            <div class="ui-btn" onclick="claimDaily()" style="min-width:60px; font-size:0.4rem;">CLAIM</div>
        </div>

        <div class="quest-card">
            <div style="text-align:left;">
                <div style="font-size:0.8rem;">Invite 3 Friends</div>
                <div style="font-size:0.5rem; color:#444;">Награда: +0.1500</div>
                <div id="ref-count" style="font-size:0.5rem; color:#00ff00;">Friends: 0/3</div>
            </div>
            <div class="ui-btn" onclick="completeQuest('invite_3')" style="min-width:60px; font-size:0.4rem;">CHECK</div>
        </div>

        <div class="quest-card">
            <div style="text-align:left;">
                <div style="font-size:0.8rem;">Invite Link</div>
                <div style="font-size:0.5rem; color:#444;">Позови друга</div>
            </div>
            <div class="ui-btn" onclick="inviteFriend()" style="min-width:60px; font-size:0.4rem;">SEND</div>
        </div>

        <div class="ui-btn" onclick="toggleModal('rewards')" style="width:100px; margin:20px auto;">CLOSE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id || 'guest';
        const userName = tg.initDataUnsafe?.user?.first_name || 'Guest';
        const referrerId = tg.initDataUnsafe?.start_param || null;

        let currentBalance = 0;
        let autoPower = 0;

        async function apiRequest(action = 'load') {
            try {
                const res = await fetch('/api/click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, userName, action, referrerId })
                });
                const data = await res.json();
                currentBalance = data.balance;
                autoPower = data.autoPower || 0;
                document.getElementById('balance').innerText = currentBalance.toFixed(4);
                document.getElementById('global-matter').innerText = data.globalMatter.toFixed(4);
                document.getElementById('cost-click').innerText = data.nextClickCost.toFixed(4);
                document.getElementById('cost-auto').innerText = data.nextAutoCost.toFixed(4);
                document.getElementById('ref-count').innerText = `Friends: ${data.referralCount}/3`;
            } catch (e) { console.error(e); }
        }

        async function buyUpgrade(type) {
            const res = await fetch('/api/upgrade', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, type })
            });
            const data = await res.json();
            if (data.success) {
                tg.HapticFeedback.notificationOccurred('success');
                apiRequest('load');
            } else tg.showAlert(data.message);
        }

        async function claimDaily() {
            const res = await fetch('/api/daily-bonus', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId })
            });
            const data = await res.json();
            if (data.success) {
                tg.showAlert(`Бонус +${data.amount.toFixed(4)} получен!`);
                apiRequest('load');
            } else tg.showAlert(data.message);
        }

        async function completeQuest(questId) {
            const res = await fetch('/api/complete-quest', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, questId })
            });
            const data = await res.json();
            if (data.success) {
                tg.showAlert('Квест выполнен!');
                apiRequest('load');
            } else tg.showAlert(data.message);
        }

        function inviteFriend() {
            const botUsername = 'твой_бот'; // ЗАМЕНИ НА СВОЕГО БОТА
            const inviteLink = `https://t.me/${botUsername}?start=${userId}`;
            const shareText = `Присоединяйся к извлечению Пустоты! Получи бонус по моей ссылке.`;
            const fullUrl = `https://t.me/share/url?url=${encodeURIComponent(inviteLink)}&text=${encodeURIComponent(shareText)}`;
            tg.openTelegramLink(fullUrl);
        }

        function toggleModal(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
            if (id === 'leaderboard' && el.style.display === 'block') loadLeaderboard();
        }

        async function loadLeaderboard() {
            const res = await fetch('/api/leaderboard');
            const leaders = await res.json();
            document.getElementById('leader-list').innerHTML = leaders.map((p, i) => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #111; font-size: 0.8rem;">
                    <span>${i+1}. ${p.name}</span><span>${p.balance.toFixed(4)}</span>
                </div>`).join('');
        }

        document.getElementById('void-sphere').onclick = (e) => {
            const flyText = document.createElement('div');
            flyText.innerText = '+';
            flyText.style.position = 'fixed'; flyText.style.left = e.clientX + 'px'; flyText.style.top = e.clientY + 'px';
            flyText.style.animation = 'flyUp 1s forwards'; document.body.appendChild(flyText);
            setTimeout(() => flyText.remove(), 1000);
            tg.HapticFeedback.impactOccurred('light');
            currentBalance += 0.0001; 
            document.getElementById('balance').innerText = currentBalance.toFixed(4);
            apiRequest('click');
        };

        setInterval(() => { if (autoPower > 0) { currentBalance += autoPower; document.getElementById('balance').innerText = currentBalance.toFixed(4); } }, 1000);
        apiRequest('load');
    </script>
</body>
</html>
